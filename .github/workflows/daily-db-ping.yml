name: Daily DB Ping

# Runs twice a day at 8:00 AM CST (2:00 PM UTC) and 8:00 PM CST (2:00 AM UTC, next day)
on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC (8:00 PM CST)
    - cron: '0 14 * * *'  # 2:00 PM UTC (8:00 AM CST)
  # Also allow manual triggering
  workflow_dispatch:

jobs:
  daily-db-ping:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm ci
        
    - name: Daily DB Ping
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        node scripts/daily-db-ping.js