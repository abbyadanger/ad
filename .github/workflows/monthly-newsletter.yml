name: Monthly Newsletter

# Runs on the last day of each month at 7:00 AM CST (1:00 PM UTC)
# Scheduled for days 28-31, script logic determines if it's actually the last day
on:
  schedule:
    - cron: '0 13 28-31 * *'
  # Also allow manual triggering
  workflow_dispatch:

jobs:
  send-monthly-newsletter:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install @supabase/supabase-js @emailjs/nodejs
        
    - name: Send monthly newsletter
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
        EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
        EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
        EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
      run: |
        node scripts/send-newsletter.js